<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Checkin</title>

        <style type="text/css" >
            body {
                font-size: 14px !important;
                padding:  10px;
            }
            #leftPanel div {
                /*corrige o bug do menu ficar por tras*/
                overflow: visible;
            }
        </style>

    </h:head>
    <h:body>
        <p:layout fullPage="true">  
            <p:layoutUnit position="center">  
                <h:form>  
                    <p:megaMenu >  
                        <p:menuitem value="Hotel 1" action="#{secoesInterno.sessionHotelSeleiconado(1)}" icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 2" action="#{secoesInterno.sessionHotelSeleiconado(2)}"  icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 3" action="#{secoesInterno.sessionHotelSeleiconado(3)}" icon="ui-icon-suitcase" />  
                    </p:megaMenu> 
                    <br/>
                    <h:form>  
                        <center>
                            <h:outputLabel value="Quartos" style="font-weight: bolder" ></h:outputLabel>
                        </center>
                        <p:tabView id="tabView" dynamic="true" cache="true">  

                            <p:tab id="tba1" title="Quartos">  
                                <p:dataTable paginator="true" rows="10" var="quarto" value="#{quartosBeanInterno.quartos}">  
                                    <p:column headerText="Código">  
                                        <h:outputText value="#{quarto.ID}" />  
                                    </p:column>  

                                    <p:column headerText="Capacidade">  
                                        <h:outputText value="#{quarto.qtdHospedes} pessoa(s)" />  
                                    </p:column>  

                                    <p:column headerText="Valor diária">  
                                        <h:outputText value="#{quarto.valorDiaria}" />                                          
                                    </p:column>                                      
                                    
                                    <p:column headerText="Localidade">  
                                        <h:outputText value="#{quarto.localidade.descricao}" />                                          
                                    </p:column>                                      
                                    
                                    <p:column headerText="Tipo">  
                                        <h:outputText value="#{quarto.tipoQuarto.descricao}" />                                          
                                    </p:column>  

                                    <p:column headerText="Ações"> 
                                        <p:button icon="ui-icon-pencil" />
                                        <p:button icon="ui-icon-closethick" />
                                    </p:column>  
                                </p:dataTable>  
                            </p:tab>  
                        </p:tabView>
                    </h:form>  

                </h:form>
            </p:layoutUnit>  


            <p:layoutUnit id="leftPanel" position="west" size="200" resizable="true" closable="true" collapsible="true">  
                <p:panel>
                    <h:outputText  value="   LOGO FFS   " />
                </p:panel>
                <br/>
                <h:form  > 
                    <p:growl id="messages"/>  
                    <p:tieredMenu style="width:180px" overlay="false">  
                        <p:submenu label="Clientes" icon="ui-icon-person">  
                            <p:menuitem value="Listar" action="/admin/clientes/index.xhtml" update="messages" ajax="false" icon="ui-icon-close"/>  
                        </p:submenu>  
                        <p:submenu label="Reservas" icon="ui-icon-note">  
                            <p:menuitem value="Listar" action="/admin/reservas/index.xhtml" update="messages" ajax="false" icon="ui-icon-close"/>  
                        </p:submenu> 
                        <p:submenu label="Quartos" icon="ui-icon-key">  
                            <p:menuitem value="Listar" update="messages" ajax="false" icon="ui-icon-close"/>                              
                        </p:submenu>  
                        <p:separator />  
                        <p:submenu label="Usuarios" icon="ui-icon-gear">  
                            <p:submenu label="Prime Links">  
                                <p:menuitem value="Prime" url="http://www.prime.com.tr" />  
                                <p:menuitem value="PrimeFaces" url="http://www.primefaces.org" />  
                            </p:submenu>   
                        </p:submenu>  
                    </p:tieredMenu>  
                </h:form> 
            </p:layoutUnit>  




        </p:layout>        
    </h:body>
</html>
