<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Checkin</title>

        <style type="text/css" >
            body {
                font-size: 14px !important;
                padding:  10px;
            }
            #leftPanel div {
                /*corrige o bug do menu ficar por tras*/
                overflow: visible;
            }
        </style>

    </h:head>
    <h:body>


        <p:layout fullPage="true">  
            <p:layoutUnit position="center">  
                <h:form>  
                    <p:megaMenu >  
                        <p:menuitem value="Hotel 1" url="http://www.primefaces.org" icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 2" url="http://www.primefaces.org" icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 3" url="http://www.primefaces.org" icon="ui-icon-suitcase" />  
                    </p:megaMenu> 
                    <hr/>
                    <h:form>  
                        <center>
                            <h:outputLabel value="Clientes" style="font-weight: bolder" ></h:outputLabel>
                        </center>
                        <div style="text-align: right">
                            <p:commandButton icon="ui-icon-plus" onclick="window.location='adicionar.xhtml'" value="Adicionar cliente"  />
                        </div>
                        
                        <p:tabView id="tabView" dynamic="true" cache="true">  

                            <p:tab id="tba1" title="Jurídico">  
                                <p:dataTable paginator="true" rows="10" var="cliente" value="#{clientesBean.clientesJuridicos}">  
                                    <p:column headerText="Razão Social">  
                                        <h:outputText value="#{cliente.nomeEmpresa}" />  
                                    </p:column>  

                                    <p:column headerText="CNPJ">  
                                        <h:outputText value="#{cliente.cnpj}" />  
                                    </p:column>  

                                    <p:column headerText="Multinacional">  
                                        <h:outputText value="Sim" rendered="#{cliente.multinacional}" />  
                                        <h:outputText value="Não" rendered="#{not cliente.multinacional}" />  
                                    </p:column>  

                                    <p:column headerText="Ações"> 
                                        <p:button icon="ui-icon-pencil" />
                                        <p:button icon="ui-icon-closethick" />
                                    </p:column>  
                                </p:dataTable>  
                            </p:tab>  

                            <p:tab id="tab2" title="Físico">  
                                <p:dataTable paginator="true" rows="10" var="cliente" value="#{clientesBean.clientesFisicos}">  
                                    <p:column headerText="Nome">  
                                        <h:outputText value="#{cliente.nome}" />  
                                    </p:column>  

                                    <p:column headerText="Sobrenome">  
                                        <h:outputText value="#{cliente.sobrenome}" />  
                                    </p:column>  

                                    <p:column headerText="CPF">  
                                        <h:outputText value="#{cliente.cpf}" />  
                                    </p:column>  

                                    <p:column headerText="Ações"> 
                                        <p:button icon="ui-icon-pencil" />
                                        <p:button icon="ui-icon-closethick" />
                                    </p:column>  
                                </p:dataTable> 
                            </p:tab>  



                        </p:tabView>  
                    </h:form>  

                </h:form>
            </p:layoutUnit>  


            <p:layoutUnit id="leftPanel" position="west" size="200" resizable="true" closable="true" collapsible="true">  
                <p:panel>
                    <h:outputText  value="   LOGO FFS   " />
                </p:panel>
                <br/>
                <h:form  > 
                    <p:growl id="messages"/>  
                    <p:tieredMenu style="width:180px" overlay="false">  
                        <p:submenu label="Clientes" icon="ui-icon-person">  
                            <p:menuitem value="Save" actionListener="#{menuBean.save}" update="messages" icon="ui-icon-disk" />  
                            <p:menuitem value="Update" actionListener="#{menuBean.update}" update="messages" icon="ui-icon-arrowrefresh-1-w" />  
                        </p:submenu>  
                        <p:submenu label="Reservas" icon="ui-icon-note">  
                            <p:menuitem value="Delete" actionListener="#{menuBean.delete}" update="messages" ajax="false" icon="ui-icon-close"/>  
                        </p:submenu> 
                        <p:submenu label="Quartos" icon="ui-icon-key">  
                            <p:menuitem value="Save" actionListener="#{menuBean.save}" update="messages" icon="ui-icon-disk" />  
                            <p:menuitem value="Update" actionListener="#{menuBean.update}" update="messages" icon="ui-icon-arrowrefresh-1-w" />  
                        </p:submenu>  
                        <p:separator />  
                        <p:submenu label="Usuarios" icon="ui-icon-gear">  
                            <p:submenu label="Prime Links">  
                                <p:menuitem value="Prime" url="http://www.prime.com.tr" />  
                                <p:menuitem value="PrimeFaces" url="http://www.primefaces.org" />  
                            </p:submenu>   
                        </p:submenu>  
                    </p:tieredMenu>  
                </h:form> 
            </p:layoutUnit>  




        </p:layout>








    </h:body>
</html>
