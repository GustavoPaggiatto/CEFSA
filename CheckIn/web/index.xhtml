<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Checkin</title>

        <style type="text/css" >
            body {
                font-size: 14px !important;
                padding:  10px;
            }
            #leftPanel div {
                /*corrige o bug do menu ficar por tras*/
                overflow: visible;
            }

            .blur{
                box-shadow: 0px 0px 20px 10px rgba(255,255,255,1);
                -webkit-transform: scale(1.0);
                -moz-transform: scale(1.0);
                -o-transform: scale(1.0);
                -ms-transform: scale(1.0);
                transform: scale(1.0);
                opacity: 0.7;
            }
            .active{
                -webkit-transform: scale(1.05);
                -moz-transform: scale(1.05);
                -o-transform: scale(1.05);
                -ms-transform: scale(1.05);
                transform: scale(1.05);
                box-shadow: 
                    0px 0px 0px 10px rgba(255,255,255,1), 
                    1px 11px 15px 10px rgba(0,0,0,0.4);
                z-index: 100;	
                opacity: 1;
                border:0px transparent;
            }

        </style>
        <script type="text/javascript">
            $(function() {
                $('#logo').mouseenter(function() {

                    if ($('#logo').hasClass('active'))
                        return false;
                    $('#logo').not($('#logo').removeClass('blur').addClass('active'))
                            .removeClass('active')
                            .addClass('blur');
                });

                $('#logo').on('mouseleave', function(event) {
                    $('#logo').removeClass('active blur');
                });
            });</script>
        <script type="text/javascript" src='files/jquery-ui-1.9.2.custom.min.js'></script>

    </h:head>
    <h:body>
        <p:layout fullPage="true">  
            <p:layoutUnit position="center">  
                <h:form>  

                    <p:megaMenu >  
                        <p:menuitem value="Hotel 1" action="#{secoesInterno.sessionHotelSeleiconado(1)}" icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 2" action="#{secoesInterno.sessionHotelSeleiconado(2)}"  icon="ui-icon-suitcase" />  
                        <p:menuitem value="Hotel 3" action="#{secoesInterno.sessionHotelSeleiconado(3)}" icon="ui-icon-suitcase" />  
                    </p:megaMenu> 
                    <br/>
                    <h:form>  
                        <!--<p:dataTable var="car" value="Teste">  
                            <p:column headerText="Nome">  
                                <h:outputText value="Ricardo Jacomini" />  
                            </p:column>  

                            <p:column headerText="E-mail">  
                                <h:outputText value="jacmotors@ig.com.br" />  
                            </p:column>  

                            <p:column headerText="Telefones">  
                                <h:outputText value="(Sem números)" />  
                            </p:column>  

                            <p:column headerText="Ações"> 
                                <p:button icon="ui-icon-pencil" />
                                <p:button icon="ui-icon-closethick" />
                            </p:column>  
                        </p:dataTable>  -->
                        <div style='height: 200px'></div>
                        <div style='padding-left: 35%'>
                            <img id="logo" class="blur" style="top: 200px" align="center" src="files/logo.png" alt="Welcome Inn" border="0"/>
                        </div>
                    </h:form>  

                </h:form>
            </p:layoutUnit>  


            <p:layoutUnit id="leftPanel" position="west" size="200" resizable="true" closable="true" collapsible="true">  
                <p:panel>
                    <h:outputText  value="   LOGO FFS   " />
                </p:panel>
                <br/>
                <h:form  > 
                    <p:growl id="messages"/>  
                    <p:tieredMenu style="width:180px" overlay="false">  
                        <p:submenu label="Clientes" icon="ui-icon-person">  
                            <p:menuitem value="Listar" action="admin/clientes/index.xtml" update="messages" icon="ui-icon-disk" />                            
                        </p:submenu>  
                        <p:submenu label="Reservas" icon="ui-icon-note">  
                            <p:menuitem value="Listar" action="admin/reservas/index.xhtml" update="messages" ajax="false" icon="ui-icon-close"/>  
                        </p:submenu> 
                        <p:submenu label="Quartos" icon="ui-icon-key">  
                            <p:menuitem value="Listar" action="/admin/Quartos/Quartos.xhtml" update="messages" icon="ui-icon-disk" />                              
                        </p:submenu>  
                        <p:separator />  
                        <p:submenu label="Usuarios" icon="ui-icon-gear">  
                            <p:submenu label="Prime Links">  
                                <p:menuitem value="Prime" url="http://www.prime.com.tr" />  
                                <p:menuitem value="PrimeFaces" url="http://www.primefaces.org" />  
                            </p:submenu>   
                        </p:submenu>  
                    </p:tieredMenu>  
                </h:form> 
            </p:layoutUnit>  




        </p:layout>








    </h:body>
</html>
