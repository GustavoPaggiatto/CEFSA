<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Checkin</title>
        <style type="text/css">      
            
        </style>
    </h:head>
    <h:body style="background-color: teal">
        <div style="width: 100%; height: 100%; background-color: teal;">                  
            <div style="width: 100%; height: 25px; z-index: visible; vertical-align: top; background-color: darkcyan"></div>
            <h:form style="width: 100%; height: 100%; padding-top: 200px">                                            
                <div style="float: left; padding-left: 100px;">                        
                    <h:graphicImage style="padding-top: 40px; padding-left: 60px" url="Imagens/logoTemp.jpg"></h:graphicImage>
                </div>
                <p:panel style="border: 0; background-color: teal; padding-right: 140px; float: right">
                    <h:panelGrid cellpadding="2" cellspacing="2" columns="1">                    
                        <p:row>
                            <p:column><h:outputText style="color: aliceblue;" value="CPF: * " /></p:column>
                        </p:row>      
                        <p:row>
                            <p:column><p:inputText id="txtLogin" label="Login: * " required="true" validatorMessage="CPF não informado" value="#{login.loginUsuarioValue}"/></p:column>
                        </p:row>
                        <p:row>
                            <p:column><h:outputText style="color: aliceblue;" value="Senha: * " /></p:column>                                
                        </p:row>
                        <p:row>
                            <p:column><p:password id="txtSenha" label="Senha: * " validatorMessage="Senha não informada" value="#{login.senha}" required="true"/></p:column>                    
                        </p:row>
                        <p:row>
                            <p:column colspan="2"><p:messages showDetail="false" id="messages"/></p:column>
                        </p:row>
                        <p:row>
                            <p:column colspan="2" width="100%" style="text-align: center"><p:commandButton value="Login" ajax="false"
                                                                                                           actionListener="#{login.LoginUsuario()}"/></p:column>
                        </p:row>
                        <!--<p:captcha label="Captcha"/>-->

                    </h:panelGrid>
                </p:panel>                    
            </h:form>
        </div>        
    </h:body>
</html>
